<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set Up Your Agent · AgentMart</title>
<style>
  :root {
    --cream: #FAF6F0;
    --terracotta: #C4693A;
    --text: #1A1A1A;
    --muted: #6B6B6B;
    --border: #E0D8CE;
    --card: #FFFFFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Georgia', serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 20px;
  }
  .container { max-width: 520px; margin: 0 auto; }
  .brand {
    text-align: center;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--terracotta);
    margin-bottom: 32px;
  }
  .brand a { color: inherit; text-decoration: none; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
  }
  h1 {
    font-size: 26px;
    font-weight: normal;
    margin-bottom: 8px;
    line-height: 1.3;
  }
  .subtitle {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.6;
    margin-bottom: 32px;
    font-family: sans-serif;
  }
  .persona-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 8px 16px;
    font-family: sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--terracotta);
    margin-bottom: 32px;
  }
  .field { margin-bottom: 20px; }
  label {
    display: block;
    font-family: sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  input[type="text"],
  input[type="email"],
  input[type="tel"] {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 15px;
    font-family: sans-serif;
    background: var(--cream);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--terracotta); background: #fff; }
  input[readonly] { color: var(--muted); cursor: default; }
  .channel-group {
    display: flex;
    gap: 12px;
    margin-top: 6px;
  }
  .channel-opt {
    flex: 1;
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    font-family: sans-serif;
  }
  .channel-opt input { display: none; }
  .channel-opt .icon { font-size: 22px; display: block; margin-bottom: 4px; }
  .channel-opt .label { font-size: 13px; font-weight: 600; color: var(--text); }
  .channel-opt.selected {
    border-color: var(--terracotta);
    background: #FFF5F0;
  }
  .submit-btn {
    width: 100%;
    background: var(--terracotta);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 16px;
    font-size: 16px;
    font-family: sans-serif;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s;
  }
  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .note {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    font-family: sans-serif;
    margin-top: 14px;
  }
  .success {
    display: none;
    text-align: center;
    padding: 20px 0;
  }
  .success .check { font-size: 48px; margin-bottom: 16px; }
  .success h2 { font-size: 22px; margin-bottom: 10px; font-weight: normal; }
  .success p { color: var(--muted); font-family: sans-serif; font-size: 14px; line-height: 1.6; }
  .timer {
    display: inline-block;
    background: #FFF0E8;
    color: var(--terracotta);
    font-family: sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 100px;
    margin-top: 16px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="brand"><a href="https://agentmart.rosabuilds.com">← Rosalinda AgentMart</a></div>

  <div class="card">
    <div id="form-view">
      <h1>Set up your agent</h1>
      <p class="subtitle">Two minutes. Then your agent messages you directly.</p>

      <div class="persona-badge" id="persona-badge">⚙️ Loading...</div>

      <form id="onboard-form">
        <div class="field">
          <label>Your name</label>
          <input type="text" id="f-name" placeholder="First name" required />
        </div>
        <div class="field">
          <label>Email (from your purchase)</label>
          <input type="email" id="f-email" readonly />
        </div>
        <div class="field">
          <label>Phone number</label>
          <input type="tel" id="f-phone" placeholder="+1 555 000 0000" required />
        </div>
        <div class="field">
          <label>Where should your agent message you?</label>
          <div class="channel-group">
            <label class="channel-opt selected" id="opt-whatsapp" onclick="selectChannel('whatsapp')">
              <input type="radio" name="channel" value="whatsapp" checked />
              <span class="icon">💬</span>
              <span class="label">WhatsApp</span>
            </label>
            <label class="channel-opt" id="opt-telegram" onclick="selectChannel('telegram')">
              <input type="radio" name="channel" value="telegram" />
              <span class="icon">✈️</span>
              <span class="label">Telegram</span>
            </label>
          </div>
        </div>
        <button type="submit" class="submit-btn" id="submit-btn">Activate My Agent →</button>
        <p class="note">No spam. Your agent messages you, not a newsletter.</p>
      </form>
    </div>

    <div class="success" id="success-view">
      <div class="check">✅</div>
      <h2>You're all set.</h2>
      <p id="success-msg">Your agent is being configured now.</p>
      <div class="timer">⏱ Live within 30 minutes</div>
    </div>
  </div>
</div>

<script>
  const PERSONA_LABELS = {
    nova:  { label: 'Nova — The Founder\'s AI',       emoji: '🌟' },
    ember: { label: 'Ember — Content & Growth AI',    emoji: '🔥' },
    sage:  { label: 'Sage — The Research Agent',      emoji: '🔮' },
    atlas: { label: 'Atlas — The Dev Agent',           emoji: '⚙️' },
    iris:  { label: 'Iris — Executive Assistant AI',  emoji: '🌸' },
    luna:  { label: 'Luna — E-commerce AI',            emoji: '🌙' }
  };

  const params = new URLSearchParams(window.location.search);
  const persona = params.get('persona') || 'nova';
  const email   = params.get('email')   || '';
  const name    = params.get('name')    || '';

  const info = PERSONA_LABELS[persona] || { label: persona, emoji: '🤖' };
  document.getElementById('persona-badge').textContent = `${info.emoji} ${info.label}`;
  document.getElementById('f-email').value = email;
  if (name) document.getElementById('f-name').value = name;

  let selectedChannel = 'whatsapp';
  function selectChannel(ch) {
    selectedChannel = ch;
    document.getElementById('opt-whatsapp').classList.toggle('selected', ch === 'whatsapp');
    document.getElementById('opt-telegram').classList.toggle('selected', ch === 'telegram');
  }

  document.getElementById('onboard-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Activating…';

    const payload = {
      type:    'onboard_form',
      name:    document.getElementById('f-name').value.trim(),
      email:   email,
      persona: info.label,
      emoji:   info.emoji,
      phone:   document.getElementById('f-phone').value.trim(),
      channel: selectedChannel
    };

    try {
      await fetch('https://agentmart-webhook.vercel.app/api/notify-rosa', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
    } catch (e) {
      console.error('Submit error:', e);
    }

    // Show success regardless (don't fail the user if fetch errors)
    document.getElementById('form-view').style.display = 'none';
    const sv = document.getElementById('success-view');
    sv.style.display = 'block';
    document.getElementById('success-msg').textContent =
      `${info.emoji} ${info.label.split(' — ')[0]} is being configured for ${payload.channel === 'whatsapp' ? 'WhatsApp' : 'Telegram'}. Watch for a message from +1 (786) 777-9356.`;
  });
</script>
</body>
</html>
